[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/gemini/generate"
  to = "/.netlify/functions/generate"
  status = 200

[[redirects]]
  from = "/api/gemini/enhance"
  to = "/.netlify/functions/enhance"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
